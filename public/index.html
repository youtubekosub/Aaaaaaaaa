<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>proxy</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    #uv-loading {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, .8); z-index: 99999;
    }
    #uv-loading svg { width: 50px; height: 50px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="background" aria-hidden="true"></div>
  <div class="app-root">
    <main class="layout">
      <section class="center-panel">
        <div class="card">
          <header class="card-header">
            <div class="brand"><span class="text">proxy</span></div>
          </header>
          <div class="search-area">
            <form id="uv-form" class="searchbar" autocomplete="off">
              <div class="icon"><img src="/assets/images/search.svg" width="20" height="20" alt="" /></div>
              <input id="uv-address" type="search" class="search-input" placeholder="Search URL or keyword…" />
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="uv-loading">
    <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="#3b82f6" stroke-width="4" stroke-dasharray="90 30"/></svg>
  </div>

  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <script>
    const form = document.getElementById("uv-form");
    const address = document.getElementById("uv-address");
    const loading = document.getElementById("uv-loading");

    // UVエンコード関数 (XOR)
    function encodeUV(str) {
      if (!str) return str;
      return encodeURIComponent(str.split('').map((c, i) => i % 2 ? String.fromCharCode(c.charCodeAt(0) ^ 2) : c).join(''));
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const raw = address.value.trim();
      if (!raw) return;

      loading.style.display = "flex";

      try {
        // Service Workerの登録
        await navigator.serviceWorker.register('/sw.js', { scope: __uv$config.prefix });

        // URL判定
        let url = raw;
        if (!/^https?:\/\//.test(url) && !url.includes('.')) {
          url = "https://www.google.com/search?q=" + encodeURIComponent(raw);
        } else if (!/^https?:\/\//.test(url)) {
          url = "https://" + url;
        }

        // about:blank 展開
        const win = window.open();
        if (!win) {
          alert("ポップアップを許可してください");
          loading.style.display = "none";
          return;
        }

        const proxyUrl = window.location.origin + __uv$config.prefix + encodeUV(url);
        
        win.document.body.style.margin = "0";
        win.document.body.style.height = "100vh";
        const iframe = win.document.createElement("iframe");
        iframe.style.width = "100%"; iframe.style.height = "100%"; iframe.style.border = "none";
        iframe.src = proxyUrl;
        win.document.body.appendChild(iframe);

        loading.style.display = "none";
        address.value = "";
      } catch (err) {
        alert("エラー: " + err.message);
        loading.style.display = "none";
      }
    };
  </script>
</body>
</html>
